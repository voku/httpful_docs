<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Httpful social preview</title>
  <desc id="desc">Httpful documentation preview with tagline and PHP code sample.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#111827" />
      <stop offset="100%" stop-color="#1f2937" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect x="72" y="72" width="128" height="128" rx="28" fill="#d97706" />
  <path d="M123 102h18v35h24v-35h18v88h-18v-35h-24v35h-18z" fill="#fff" />
  <text x="72" y="286" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="68" font-weight="800">
    Httpful (fork)
  </text>
  <text x="72" y="352" fill="#f59e0b" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">
    Readable cURL for PHP
  </text>
  <text x="72" y="420" fill="#d1d5db" font-family="Inter, Arial, sans-serif" font-size="28">
    Chainable requests, smart MIME parsing, retries, parallel execution,
  </text>
  <text x="72" y="460" fill="#d1d5db" font-family="Inter, Arial, sans-serif" font-size="28">
    transfer diagnostics, and PSR compatibility without raw cURL soup.
  </text>
  <rect x="712" y="118" width="416" height="332" rx="24" fill="#0b1220" stroke="#374151" />
  <text x="748" y="188" fill="#f3f4f6" font-family="JetBrains Mono, monospace" font-size="24">
    $response = Request::get(...)
  </text>
  <text x="748" y="232" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="24">
    -&gt;withBearerToken(...)
  </text>
  <text x="748" y="276" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="24">
    -&gt;withRetry(3)
  </text>
  <text x="748" y="320" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="24">
    -&gt;expectsJson()
  </text>
  <text x="748" y="364" fill="#f59e0b" font-family="JetBrains Mono, monospace" font-size="24">
    -&gt;send();
  </text>
</svg>
